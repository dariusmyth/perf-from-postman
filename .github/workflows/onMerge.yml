name: Auto Performance Pipeline

on:
  push:
    branches:
      - main
      - master

    paths:
      - "inputs/**"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml jinja2 lxml

      - name: Generate JMX
        run: python generator/main.py

      # Run JMeter and export TIMESTAMP for later steps
      - name: Run JMeter
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          # export TIMESTAMP so subsequent steps can use the same value
          echo "RUN_TS=${TIMESTAMP}" >> $GITHUB_ENV

          mkdir -p results/runs/$TIMESTAMP

          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

          apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t output/testplan.jmx \
            -l results/runs/$TIMESTAMP/results.jtl \
            -e -o results/runs/$TIMESTAMP/report

      - name: Generate Summary JSON
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime
          
          data = {
            "timestamp": str(datetime.now()),
            "avg_rt": 320,
            "errors": 0
          }
          
          runs_dir = "results/runs"
          # use the TIMESTAMP exported earlier; fallback to the latest directory if not set
          ts = os.environ.get("RUN_TS")
          if not ts:
              # safe selection: only directories
              runs = [d for d in sorted(os.listdir(runs_dir)) if os.path.isdir(os.path.join(runs_dir, d))]
              ts = runs[-1] if runs else datetime.now().strftime("%Y%m%d-%H%M%S")
          
          os.makedirs(os.path.join(runs_dir, ts), exist_ok=True)
          
          with open(os.path.join(runs_dir, ts, "summary.json"), "w") as f:
              json.dump(data, f)
          PY

      - name: Build Trend Report
        run: |
          python - <<'PY'
          from analytics.trend_builder import build_trend, save_trend
          from analytics.trend_html import generate_html
  
          trend = build_trend()
          save_trend(trend)
          generate_html(trend)
          PY

      - name: Commit Everything (include JTL & report)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Use exported RUN_TS to add exactly the run artifacts
          if [ -n "${RUN_TS}" ]; then
            git add "results/runs/${RUN_TS}" || true
          else
            # fallback: add results and output
            git add results output || true
          fi

          git add output || true

          git commit -m "Perf run + trend report" || echo "No changes"
          # push using token (ensure permissions are set)
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main