name: Auto Performance Pipeline

on:
  push:
    branches:
      - main
      - master

    paths:
      - "inputs/**"

  workflow_dispatch:

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Trigger Info
        run: |
          echo "Triggered"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"